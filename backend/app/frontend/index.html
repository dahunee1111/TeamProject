<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 이상행동 감지 시스템</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 20px;
    }

    .full {
      grid-column: 1 / -1;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 16px;
    }

    button {
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.92;
    }

    button:disabled {
      background: #9aa4b2;
      cursor: not-allowed;
    }

    .status-text {
      margin-top: 14px;
      font-size: 14px;
      color: #555;
      word-break: break-word;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .value {
      font-size: 20px;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .badge-safe {
      background: #16a34a;
    }

    .badge-warning {
      background: #f59e0b;
    }

    .badge-danger {
      background: #dc2626;
    }

    .gauge-wrap {
      margin-top: 8px;
    }

    .gauge-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .gauge-bar {
      width: 100%;
      height: 20px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .fill-safe {
      background: #16a34a;
    }

    .fill-warning {
      background: #f59e0b;
    }

    .fill-danger {
      background: #dc2626;
    }

    .action-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      font-weight: 600;
    }

    .json-box {
      margin-top: 16px;
      background: #111827;
      color: #f9fafb;
      border-radius: 14px;
      padding: 18px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.5;
    }

    .muted {
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 800px) {
      .grid,
      .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">AI 이상행동 감지 시스템</div>
    <div class="subtitle">
      영상 업로드 → 행동 분석 → 위험물품 탐지 → 위험도 점수 계산 → 자동 대응
    </div>

    <div class="grid">
      <div class="card">
        <h2>1. 영상 업로드</h2>
        <input type="file" id="videoFile" accept="video/*" />
        <button id="uploadBtn">영상 업로드</button>
        <div class="status-text" id="uploadStatus">업로드 전</div>
      </div>

      <div class="card">
        <h2>2. 분석 실행</h2>
        <button id="analyzeBtn" disabled>분석 시작</button>
        <div class="status-text" id="analyzeStatus">분석 전</div>
        <div class="status-text" id="videoIdText">video_id: 없음</div>
      </div>

      <div class="card full">
        <h2>3. 분석 결과 대시보드</h2>

        <div id="emptyState" class="muted">아직 분석 결과가 없습니다.</div>

        <div id="resultSection" style="display: none;">
          <div class="result-grid">
            <div class="info-box">
              <div class="label">행동 분석 결과</div>
              <div class="value" id="behaviorResult">-</div>
            </div>

            <div class="info-box">
              <div class="label">위험물품 탐지 결과</div>
              <div class="value" id="objectResult">-</div>
            </div>

            <div class="info-box">
              <div class="label">대응 액션</div>
              <div class="value" id="actionResult">-</div>
            </div>

            <div class="info-box">
              <div class="label">상태</div>
              <div id="statusBadge">-</div>
            </div>
          </div>

          <div class="gauge-wrap">
            <div class="gauge-header">
              <span>위험도 점수</span>
              <span id="riskScoreText">0</span>
            </div>
            <div class="gauge-bar">
              <div id="gaugeFill" class="gauge-fill"></div>
            </div>
          </div>

          <div class="action-box" id="actionMessage">
            대응 메시지가 여기에 표시됩니다.
          </div>

          <div class="json-box" id="resultJson">
            결과 JSON이 여기에 표시됩니다.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "http://127.0.0.1:8000";

    const videoFileInput = document.getElementById("videoFile");
    const uploadBtn = document.getElementById("uploadBtn");
    const analyzeBtn = document.getElementById("analyzeBtn");

    const uploadStatus = document.getElementById("uploadStatus");
    const analyzeStatus = document.getElementById("analyzeStatus");
    const videoIdText = document.getElementById("videoIdText");

    const emptyState = document.getElementById("emptyState");
    const resultSection = document.getElementById("resultSection");

    const behaviorResult = document.getElementById("behaviorResult");
    const objectResult = document.getElementById("objectResult");
    const actionResult = document.getElementById("actionResult");
    const statusBadge = document.getElementById("statusBadge");
    const riskScoreText = document.getElementById("riskScoreText");
    const gaugeFill = document.getElementById("gaugeFill");
    const actionMessage = document.getElementById("actionMessage");
    const resultJson = document.getElementById("resultJson");

    let uploadedVideoId = null;

    function getStatusInfo(score) {
      if (score < 30) {
        return {
          text: "안전",
          badgeClass: "badge badge-safe",
          fillClass: "gauge-fill fill-safe"
        };
      } else if (score < 85) {
        return {
          text: "주의/위험",
          badgeClass: "badge badge-warning",
          fillClass: "gauge-fill fill-warning"
        };
      } else {
        return {
          text: "긴급",
          badgeClass: "badge badge-danger",
          fillClass: "gauge-fill fill-danger"
        };
      }
    }

    function renderResult(data) {
      emptyState.style.display = "none";
      resultSection.style.display = "block";

      behaviorResult.textContent =
        data.behavior_result === 1
          ? `이상 (${data.behavior_confidence})`
          : `정상 (${data.behavior_confidence})`;

      objectResult.textContent = data.object_detected
        ? `${data.object_label} (${data.object_confidence})`
        : "위험물품 없음";

      actionResult.textContent = data.action;

      const status = getStatusInfo(data.risk_score);
      statusBadge.innerHTML = `<span class="${status.badgeClass}">${status.text}</span>`;

      riskScoreText.textContent = data.risk_score;
      gaugeFill.className = status.fillClass;
      gaugeFill.style.width = `${Math.min(data.risk_score, 100)}%`;

      actionMessage.textContent = data.action_result;
      resultJson.textContent = JSON.stringify(data, null, 2);
    }

    uploadBtn.addEventListener("click", async () => {
      const file = videoFileInput.files[0];

      if (!file) {
        uploadStatus.textContent = "영상 파일을 먼저 선택해주세요.";
        return;
      }

      try {
        uploadStatus.textContent = "업로드 중...";
        analyzeStatus.textContent = "분석 전";
        analyzeBtn.disabled = true;
        uploadedVideoId = null;
        videoIdText.textContent = "video_id: 없음";

        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch(`${BASE_URL}/upload/video`, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          throw new Error("업로드 실패");
        }

        const data = await response.json();
        uploadedVideoId = data.video_id;

        uploadStatus.textContent = `업로드 성공: ${data.filename}`;
        videoIdText.textContent = `video_id: ${uploadedVideoId}`;
        analyzeBtn.disabled = false;
      } catch (error) {
        uploadStatus.textContent = `업로드 오류: ${error.message}`;
      }
    });

    analyzeBtn.addEventListener("click", async () => {
      if (!uploadedVideoId) {
        analyzeStatus.textContent = "먼저 영상을 업로드해주세요.";
        return;
      }

      try {
        analyzeStatus.textContent = "분석 중...";

        const response = await fetch(`${BASE_URL}/analyze/${uploadedVideoId}`, {
          method: "POST",
        });

        if (!response.ok) {
          throw new Error("분석 실패");
        }

        const data = await response.json();

        analyzeStatus.textContent = "분석 완료";
        renderResult(data);
      } catch (error) {
        analyzeStatus.textContent = `분석 오류: ${error.message}`;
      }
    });
  </script>
</body>
</html>
